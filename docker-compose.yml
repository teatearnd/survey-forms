services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: survey-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      REDIS_ADDRESS: redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: survey-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped

volumes:
  redis_data: